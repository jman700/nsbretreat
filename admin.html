<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — NSB Retreat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blush: #f9ece8;
      --sand: #e8ddd0;
      --tan: #d4c4b0;
      --accent: #b8967e;
      --charcoal: #2d2926;
      --charcoal-light: #6b6460;
      --white: #fff;
      --font-serif: 'Cormorant Garamond', serif;
      --font-sans: 'Inter', sans-serif;
      --radius: 14px;
      --radius-sm: 8px;
      --shadow: 0 2px 12px rgba(45,41,38,0.08);
      --shadow-lg: 0 8px 32px rgba(45,41,38,0.14);
    }

    body { font-family: var(--font-sans); background: var(--sand); color: var(--charcoal); min-height: 100vh; }

    /* ── Header ── */
    .admin-header {
      background: var(--charcoal); color: var(--white);
      padding: 0 1.5rem; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .admin-header-title { font-family: var(--font-serif); font-size: 1.2rem; letter-spacing: 0.02em; }
    .admin-header-title span {
      font-family: var(--font-sans); font-size: 0.72rem; text-transform: uppercase;
      letter-spacing: 0.12em; color: rgba(255,255,255,0.55); display: block; margin-top: 1px;
    }
    .btn-logout {
      background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.85);
      border: 1px solid rgba(255,255,255,0.2); border-radius: var(--radius-sm);
      padding: 0.4rem 0.875rem; font-family: var(--font-sans); font-size: 0.72rem;
      text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer; transition: background 0.15s;
    }
    .btn-logout:hover { background: rgba(255,255,255,0.18); }

    /* ── Login ── */
    .login-wrap { display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 56px); padding: 2rem 1rem; }
    .login-card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow-lg); padding: 2.5rem 2rem; width: 100%; max-width: 400px; }
    .login-title { font-family: var(--font-serif); font-size: 1.75rem; margin-bottom: 0.375rem; }
    .login-sub { font-size: 0.85rem; color: var(--charcoal-light); margin-bottom: 2rem; }
    .login-form { display: flex; flex-direction: column; gap: 1rem; }
    .login-field { display: flex; flex-direction: column; gap: 0.375rem; }
    .login-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--charcoal-light); }
    .login-input {
      border: 1.5px solid var(--tan); border-radius: var(--radius-sm);
      padding: 0.75rem 1rem; font-family: var(--font-sans); font-size: 0.9rem;
      color: var(--charcoal); background: var(--white); outline: none;
      transition: border-color 0.15s; width: 100%;
    }
    .login-input:focus { border-color: var(--accent); }
    .btn-primary {
      background: var(--charcoal); color: var(--white); border: none;
      border-radius: var(--radius-sm); padding: 0.875rem 1.5rem;
      font-family: var(--font-sans); font-size: 0.85rem; font-weight: 500;
      letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer;
      transition: opacity 0.15s; margin-top: 0.5rem;
    }
    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .login-error {
      display: none; background: rgba(220,53,69,0.08); color: #b91c1c;
      border: 1.5px solid rgba(220,53,69,0.3); border-radius: var(--radius-sm);
      padding: 0.75rem 1rem; font-size: 0.875rem; margin-top: 0.5rem;
    }
    .login-error.show { display: block; }

    /* ── Dashboard ── */
    .dashboard { display: none; max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }
    .dashboard.visible { display: block; }
    .dash-top { margin-bottom: 1.5rem; }
    .dash-heading { font-family: var(--font-serif); font-size: 1.5rem; }
    .dash-count { font-size: 0.8rem; color: var(--charcoal-light); margin-top: 4px; }

    /* Feedback list */
    .feedback-list { display: flex; flex-direction: column; gap: 0.875rem; }
    .fb-card {
      background: var(--white); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 1.25rem 1.5rem;
      display: flex; flex-direction: column; gap: 0.5rem;
    }
    .fb-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; }
    .fb-guest { font-weight: 600; font-size: 0.9rem; }
    .fb-date { font-size: 0.72rem; color: var(--charcoal-light); white-space: nowrap; flex-shrink: 0; }
    .fb-message { font-size: 0.9rem; color: var(--charcoal-light); line-height: 1.65; }

    /* Empty / loading */
    .dash-empty { display: none; text-align: center; padding: 4rem 1rem; color: var(--charcoal-light); }
    .dash-empty.show { display: block; }
    .dash-empty p { font-size: 0.9rem; margin-top: 0.5rem; }
    .dash-loading { text-align: center; padding: 3rem; color: var(--charcoal-light); font-size: 0.875rem; }

    /* ── Section divider ── */
    .dash-section { margin-top: 2.5rem; margin-bottom: 1.25rem; }
    .dash-section-title {
      font-family: var(--font-serif); font-size: 1.25rem;
      border-bottom: 1.5px solid var(--tan); padding-bottom: 0.5rem; margin-bottom: 0;
    }

    /* ── Guestbook entries ── */
    .gb-list { display: flex; flex-direction: column; gap: 0.875rem; }
    .gb-card {
      background: var(--white); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 1.25rem 1.5rem;
      display: flex; flex-direction: column; gap: 0.5rem;
    }
    .gb-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; }
    .gb-card-meta { display: flex; flex-direction: column; gap: 2px; }
    .gb-guest { font-weight: 600; font-size: 0.9rem; }
    .gb-stay { font-size: 0.72rem; color: var(--charcoal-light); }
    .gb-date { font-size: 0.72rem; color: var(--charcoal-light); white-space: nowrap; flex-shrink: 0; }
    .gb-message { font-size: 0.9rem; color: var(--charcoal-light); line-height: 1.65; }
    .btn-delete {
      background: rgba(220,53,69,0.08); color: #b91c1c;
      border: 1px solid rgba(220,53,69,0.25); border-radius: var(--radius-sm);
      padding: 0.3rem 0.75rem; font-family: var(--font-sans); font-size: 0.72rem;
      text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer;
      transition: background 0.15s; flex-shrink: 0; align-self: flex-start;
    }
    .btn-delete:hover { background: rgba(220,53,69,0.15); }
    .btn-hide {
      background: rgba(107,100,96,0.1); color: var(--charcoal-light);
      border: 1px solid rgba(107,100,96,0.25); border-radius: var(--radius-sm);
      padding: 0.3rem 0.75rem; font-family: var(--font-sans); font-size: 0.72rem;
      text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer;
      transition: background 0.15s; flex-shrink: 0;
    }
    .btn-hide:hover { background: rgba(107,100,96,0.2); }
    .gb-card.gb-hidden { opacity: 0.55; }
    .gb-card.gb-hidden .btn-hide { background: rgba(34,197,94,0.1); color: #166534; border-color: rgba(34,197,94,0.3); }
    .gb-card.gb-hidden .btn-hide:hover { background: rgba(34,197,94,0.2); }
    .gb-photo-thumb { max-width: 160px; max-height: 120px; border-radius: var(--radius-sm); object-fit: cover; margin-top: 0.625rem; display: block; }

    @media (max-width: 600px) {
      .dashboard { padding: 1.5rem 1rem 4rem; }
    }

    /* ── Guest Links ── */
    .gl-toolbar { display: flex; justify-content: flex-end; margin-bottom: 1rem; }
    .btn-new-link {
      background: var(--charcoal); color: var(--white); border: none;
      border-radius: var(--radius-sm); padding: 0.5rem 1.125rem;
      font-family: var(--font-sans); font-size: 0.78rem; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-new-link:hover { opacity: 0.85; }
    .gl-create-form {
      background: var(--white); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 1.25rem 1.5rem;
      margin-bottom: 1rem; display: none;
    }
    .gl-create-form.show { display: block; }
    .gl-form-row { display: flex; gap: 0.75rem; align-items: flex-end; flex-wrap: wrap; margin-bottom: 0.875rem; }
    .gl-field { display: flex; flex-direction: column; gap: 0.375rem; flex: 1; min-width: 180px; }
    .gl-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--charcoal-light); }
    .gl-input {
      border: 1.5px solid var(--tan); border-radius: var(--radius-sm);
      padding: 0.625rem 0.875rem; font-family: var(--font-sans); font-size: 0.875rem;
      color: var(--charcoal); background: var(--white); outline: none;
      transition: border-color 0.15s; width: 100%;
    }
    .gl-input:focus { border-color: var(--accent); }
    .gl-table-wrap { overflow-x: auto; }
    .gl-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .gl-table th {
      font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--charcoal-light); border-bottom: 1.5px solid var(--tan);
      padding: 0.5rem 0.875rem; text-align: left; white-space: nowrap;
    }
    .gl-table td { padding: 0.875rem 0.875rem; border-bottom: 1px solid var(--sand); vertical-align: top; }
    .gl-table tr.gl-expired td { opacity: 0.55; }
    .gl-exp-past { color: #b91c1c; font-size: 0.82rem; }
    .gl-exp-ok { font-size: 0.82rem; }
    .gl-url-text { font-family: monospace; font-size: 0.75rem; color: var(--charcoal-light); word-break: break-all; }
    .gl-actions { display: flex; gap: 0.375rem; flex-wrap: wrap; }
    .btn-gl {
      border-radius: var(--radius-sm); padding: 0.3rem 0.7rem;
      font-family: var(--font-sans); font-size: 0.72rem;
      text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer; transition: background 0.15s;
    }
    .btn-gl-copy { background: rgba(107,100,96,0.1); color: var(--charcoal-light); border: 1px solid rgba(107,100,96,0.25); }
    .btn-gl-copy:hover { background: rgba(107,100,96,0.2); }
    .btn-gl-edit { background: rgba(184,150,126,0.12); color: var(--accent); border: 1px solid rgba(184,150,126,0.3); }
    .btn-gl-edit:hover { background: rgba(184,150,126,0.22); }
    .btn-gl-del { background: rgba(220,53,69,0.08); color: #b91c1c; border: 1px solid rgba(220,53,69,0.25); }
    .btn-gl-del:hover { background: rgba(220,53,69,0.16); }
    .gl-edit-row { display: none; margin-top: 0.5rem; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
    .gl-edit-row.show { display: flex; }
    .gl-input-sm {
      border: 1.5px solid var(--tan); border-radius: var(--radius-sm);
      padding: 0.4rem 0.625rem; font-family: var(--font-sans); font-size: 0.8rem;
      color: var(--charcoal); outline: none; transition: border-color 0.15s;
    }
    .gl-input-sm:focus { border-color: var(--accent); }
    .gl-copy-flash {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      background: var(--charcoal); color: var(--white);
      padding: 0.5rem 1.25rem; border-radius: 999px;
      font-size: 0.82rem; opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    .gl-copy-flash.show { opacity: 1; }
  </style>
</head>
<body>

  <header class="admin-header">
    <div class="admin-header-title">
      NSB Retreat
      <span>Admin Dashboard</span>
    </div>
    <button class="btn-logout" id="btn-logout" style="display:none">Log Out</button>
  </header>

  <!-- Login -->
  <div class="login-wrap" id="login-wrap">
    <div class="login-card">
      <h1 class="login-title">Admin Login</h1>
      <p class="login-sub">NSB Retreat &middot; Guest Feedback</p>
      <form class="login-form" id="login-form" novalidate>
        <div class="login-field">
          <label class="login-label" for="login-email">Email</label>
          <input class="login-input" type="email" id="login-email" autocomplete="email" placeholder="you@example.com">
        </div>
        <div class="login-field">
          <label class="login-label" for="login-password">Password</label>
          <input class="login-input" type="password" id="login-password" autocomplete="current-password" placeholder="••••••••">
        </div>
        <button type="submit" class="btn-primary" id="login-btn">Sign In</button>
        <div class="login-error" id="login-error">Invalid email or password.</div>
      </form>
    </div>
  </div>

  <!-- Dashboard -->
  <div class="dashboard" id="dashboard">

    <!-- Guest Feedback -->
    <div class="dash-top">
      <h2 class="dash-heading">Guest Feedback</h2>
      <p class="dash-count" id="dash-count">Loading&hellip;</p>
    </div>
    <div class="feedback-list" id="feedback-list">
      <div class="dash-loading">Loading&hellip;</div>
    </div>
    <div class="dash-empty" id="dash-empty">
      <p>&#9675;</p>
      <p>No feedback yet.</p>
    </div>

    <!-- Guestbook -->
    <div class="dash-section">
      <h2 class="dash-section-title">Guestbook</h2>
    </div>
    <p class="dash-count" id="gb-count">Loading&hellip;</p>
    <div class="gb-list" id="gb-list" style="margin-top:0.875rem">
      <div class="dash-loading">Loading&hellip;</div>
    </div>
    <div class="dash-empty" id="gb-empty">
      <p>&#9675;</p>
      <p>No guestbook entries yet.</p>
    </div>

    <!-- Guest Links -->
    <div class="dash-section">
      <h2 class="dash-section-title">Guest Links</h2>
    </div>
    <div class="gl-toolbar">
      <button class="btn-new-link" id="btn-new-link" onclick="toggleCreateForm()">+ New Link</button>
    </div>
    <div class="gl-create-form" id="gl-create-form">
      <div class="gl-form-row">
        <div class="gl-field">
          <label class="gl-label" for="gl-new-label">Label</label>
          <input class="gl-input" type="text" id="gl-new-label" placeholder="e.g. Smith Family June 2026">
        </div>
        <div class="gl-field">
          <label class="gl-label" for="gl-new-expires">Expires (checkout date &amp; time)</label>
          <input class="gl-input" type="datetime-local" id="gl-new-expires">
        </div>
      </div>
      <div style="display:flex;gap:0.5rem">
        <button class="btn-primary" style="margin-top:0;padding:0.5rem 1.25rem;font-size:0.82rem" onclick="createToken()">Create Link</button>
        <button class="btn-delete" style="padding:0.5rem 1rem" onclick="toggleCreateForm()">Cancel</button>
      </div>
    </div>
    <div id="gl-list"><div class="dash-loading">Loading&hellip;</div></div>
    <div class="gl-copy-flash" id="gl-copy-flash">Link copied!</div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    var sb = supabase.createClient(
      'https://xittuxwilxmzzawjdivd.supabase.co',
      'sb_publishable_AxzdizEiC3FOPYdzS3lPWA_H1aH9hSV'
    );

    sb.auth.onAuthStateChange(function (event, session) {
      if (session) { showDashboard(); } else { showLogin(); }
    });

    function showLogin() {
      document.getElementById('login-wrap').style.display = 'flex';
      document.getElementById('dashboard').classList.remove('visible');
      document.getElementById('btn-logout').style.display = 'none';
    }

    function showDashboard() {
      document.getElementById('login-wrap').style.display = 'none';
      document.getElementById('dashboard').classList.add('visible');
      document.getElementById('btn-logout').style.display = 'block';
      loadFeedback();
      loadGuestbook();
      loadTokens();
    }

    document.getElementById('login-form').addEventListener('submit', async function (e) {
      e.preventDefault();
      var errEl = document.getElementById('login-error');
      var btn = document.getElementById('login-btn');
      errEl.classList.remove('show');
      btn.disabled = true; btn.textContent = 'Signing in…';
      var _a = await sb.auth.signInWithPassword({
        email: document.getElementById('login-email').value.trim(),
        password: document.getElementById('login-password').value
      });
      btn.disabled = false; btn.textContent = 'Sign In';
      if (_a.error) { errEl.textContent = _a.error.message || 'Invalid email or password.'; errEl.classList.add('show'); }
    });

    document.getElementById('btn-logout').addEventListener('click', function () { sb.auth.signOut(); });

    async function loadFeedback() {
      var _a = await sb.from('guest_feedback').select('*').order('created_at', { ascending: false });
      var list = document.getElementById('feedback-list');
      var empty = document.getElementById('dash-empty');

      if (_a.error) { list.innerHTML = '<p style="color:#b91c1c;font-size:0.875rem;padding:1rem">Failed to load.</p>'; return; }

      var data = _a.data || [];
      document.getElementById('dash-count').textContent = data.length === 0 ? 'No submissions yet' : data.length === 1 ? '1 submission' : data.length + ' submissions';

      if (data.length === 0) { list.innerHTML = ''; empty.classList.add('show'); return; }

      empty.classList.remove('show');
      list.innerHTML = data.map(function (r) {
        var date = new Date(r.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        return '<div class="fb-card">'
          + '<div class="fb-card-top"><span class="fb-guest">' + esc(r.guest_name) + '</span><span class="fb-date">' + date + '</span></div>'
          + '<p class="fb-message">' + esc(r.message) + '</p>'
          + '</div>';
      }).join('');
    }

    function esc(str) {
      if (!str) return '';
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function escAttr(s) {
      return String(s).replace(/&/g,'&amp;').replace(/'/g,'&#39;').replace(/"/g,'&quot;');
    }

    async function loadGuestbook() {
      var list = document.getElementById('gb-list');
      var empty = document.getElementById('gb-empty');
      var countEl = document.getElementById('gb-count');
      empty.classList.remove('show');

      var _a = await sb.from('guestbook').select('*').order('created_at', { ascending: false });
      if (_a.error) { list.innerHTML = '<p style="color:#b91c1c;font-size:0.875rem;padding:1rem">Failed to load guestbook.</p>'; return; }

      var data = _a.data || [];
      var visible = data.filter(function(r) { return !r.hidden; }).length;
      countEl.textContent = data.length === 0 ? 'No entries yet'
        : data.length + ' total · ' + visible + ' visible';

      if (data.length === 0) { list.innerHTML = ''; empty.classList.add('show'); return; }

      list.innerHTML = data.map(function(r) {
        var date = new Date(r.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        var stayLine = r.stay_month ? '<span class="gb-stay">Stay: ' + esc(r.stay_month) + '</span>' : '';
        var photoHTML = r.photo_url ? '<img class="gb-photo-thumb" src="' + esc(r.photo_url) + '" alt="Guest photo">' : '';
        var hiddenClass = r.hidden ? ' gb-hidden' : '';
        var hideLabel = r.hidden ? 'Show' : 'Hide';
        return '<div class="gb-card' + hiddenClass + '" data-id="' + r.id + '">'
          + '<div class="gb-card-top">'
          + '<div class="gb-card-meta"><span class="gb-guest">' + esc(r.guest_name) + '</span>' + stayLine + '</div>'
          + '<div style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap;justify-content:flex-end">'
          + '<span class="gb-date">' + date + '</span>'
          + '<button class="btn-hide" onclick="toggleGuestbookHidden(\'' + r.id + '\',' + (r.hidden ? 'true' : 'false') + ')">' + hideLabel + '</button>'
          + '<button class="btn-delete" onclick="deleteGuestbookEntry(\'' + r.id + '\')">Delete</button>'
          + '</div></div>'
          + '<p class="gb-message">' + esc(r.message) + '</p>'
          + photoHTML
          + '</div>';
      }).join('');
    }

    async function toggleGuestbookHidden(id, currentHidden) {
      var _a = await sb.from('guestbook').update({ hidden: !currentHidden }).eq('id', id);
      if (_a.error) { alert('Failed to update: ' + _a.error.message); return; }
      loadGuestbook();
    }

    async function deleteGuestbookEntry(id) {
      if (!confirm('Delete this guestbook entry? This cannot be undone.')) return;
      var _a = await sb.from('guestbook').delete().eq('id', id);
      if (_a.error) { alert('Failed to delete: ' + _a.error.message); return; }
      loadGuestbook();
    }

    // ── Guest Links ──────────────────────────────────────────────────────────

    function genToken() {
      var bytes = new Uint8Array(8);
      crypto.getRandomValues(bytes);
      return Array.from(bytes).map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
    }

    function toggleCreateForm() {
      document.getElementById('gl-create-form').classList.toggle('show');
    }

    async function loadTokens() {
      var list = document.getElementById('gl-list');
      list.innerHTML = '<div class="dash-loading">Loading&hellip;</div>';
      var _a = await sb.from('guest_tokens').select('*').order('created_at', { ascending: false });
      if (_a.error) { list.innerHTML = '<p style="color:#b91c1c;font-size:0.875rem;padding:1rem 0">Failed to load.</p>'; return; }
      var data = _a.data || [];
      if (data.length === 0) { list.innerHTML = '<p style="color:var(--charcoal-light);font-size:0.875rem;padding:1rem 0">No guest links yet.</p>'; return; }
      var now = Date.now();
      var rows = data.map(function(r) {
        var expired = new Date(r.expires_at).getTime() <= now;
        var expStr = new Date(r.expires_at).toLocaleString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' });
        var safeToken = escAttr(r.token);
        var safeExpiry = escAttr(r.expires_at);
        var url = 'https://nsbretreat.com/guest/' + safeToken;
        return '<tr class="' + (expired ? 'gl-expired' : '') + '">'
          + '<td><strong style="font-size:0.875rem">' + esc(r.label) + '</strong></td>'
          + '<td><span class="' + (expired ? 'gl-exp-past' : 'gl-exp-ok') + '">' + expStr + (expired ? ' (expired)' : '') + '</span>'
          + '<div class="gl-edit-row" id="gl-edit-' + r.id + '">'
          + '<input class="gl-input-sm" type="datetime-local" id="gl-dt-' + r.id + '">'
          + '<button class="btn-gl btn-gl-edit" onclick="saveExpiry(\'' + r.id + '\')">Save</button>'
          + '<button class="btn-gl btn-gl-copy" onclick="cancelEdit(\'' + r.id + '\')">Cancel</button>'
          + '</div></td>'
          + '<td><span class="gl-url-text">' + url + '</span></td>'
          + '<td><div class="gl-actions">'
          + '<button class="btn-gl btn-gl-copy" onclick="copyLink(\'' + safeToken + '\')">Copy</button>'
          + '<button class="btn-gl btn-gl-edit" onclick="editExpiry(\'' + r.id + '\',\'' + safeExpiry + '\')">Edit</button>'
          + '<button class="btn-gl btn-gl-del" onclick="deleteToken(\'' + r.id + '\')">Delete</button>'
          + '</div></td>'
          + '</tr>';
      }).join('');
      list.innerHTML = '<div class="gl-table-wrap"><table class="gl-table"><thead><tr><th>Label</th><th>Expires</th><th>Link</th><th>Actions</th></tr></thead><tbody>' + rows + '</tbody></table></div>';
    }

    async function createToken() {
      var label = document.getElementById('gl-new-label').value.trim();
      var expires = document.getElementById('gl-new-expires').value;
      if (!label || !expires) { alert('Label and expiry date are required.'); return; }
      var token = genToken();
      var _a = await sb.from('guest_tokens').insert({ token: token, label: label, expires_at: new Date(expires).toISOString() });
      if (_a.error) { alert('Error: ' + _a.error.message); return; }
      document.getElementById('gl-new-label').value = '';
      document.getElementById('gl-new-expires').value = '';
      document.getElementById('gl-create-form').classList.remove('show');
      loadTokens();
    }

    function editExpiry(id, currentExpiry) {
      var editRow = document.getElementById('gl-edit-' + id);
      editRow.classList.add('show');
      var d = new Date(currentExpiry);
      var local = new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().slice(0, 16);
      document.getElementById('gl-dt-' + id).value = local;
    }

    function cancelEdit(id) {
      document.getElementById('gl-edit-' + id).classList.remove('show');
    }

    async function saveExpiry(id) {
      var val = document.getElementById('gl-dt-' + id).value;
      if (!val) return;
      var _a = await sb.from('guest_tokens').update({ expires_at: new Date(val).toISOString() }).eq('id', id);
      if (_a.error) { alert('Error: ' + _a.error.message); return; }
      loadTokens();
    }

    async function deleteToken(id) {
      if (!confirm('Delete this link? Anyone using it will lose access immediately.')) return;
      var _a = await sb.from('guest_tokens').delete().eq('id', id);
      if (_a.error) { alert('Error: ' + _a.error.message); return; }
      loadTokens();
    }

    function copyLink(token) {
      var url = 'https://nsbretreat.com/guest/' + token;
      navigator.clipboard.writeText(url).then(function() {
        var flash = document.getElementById('gl-copy-flash');
        flash.classList.add('show');
        setTimeout(function() { flash.classList.remove('show'); }, 2000);
      }).catch(function() {
        prompt('Copy this link:', url);
      });
    }
  </script>
</body>
</html>
